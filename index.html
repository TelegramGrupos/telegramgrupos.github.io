<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TelegramGrupos</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      text-align: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    .topo {
      padding: 25px 0 10px;
    }

    .banner {
      width: 300px;
      max-width: 90%;
      display: block;
      margin: 0 auto;
      border-radius: 10px;
    }

    .titulo {
      margin-top: 40px;
      font-size: 28px;
      color: #00ffcc;
      font-weight: bold;
      padding: 0 15px;
    }

    .subtitulo {
      margin-top: 15px;
      font-size: 18px;
      color: #ccc;
      padding: 0 20px;
      line-height: 1.5;
    }

    /* BOTÕES */
    .botoes {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .botao-img {
      width: 160px;
      max-width: 40%;
      border-radius: 10px;
    }

    /* BLOCO EXPLICAÇÃO */
    .explicacao-container {
      max-width: 360px; /* controla largura entre botões */
      margin: 40px auto 0;
      text-align: left;
      padding: 0 10px;
    }

    .explicacao-titulo {
      font-size: 20px;
      color: #00ffcc;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .explicacao-texto {
      font-size: 16px;
      color: #ccc;
      line-height: 1.6;
    }

    /* CORES ESPECIAIS */
    .grupo {
      color: #0088cc; /* azul Telegram */
      font-weight: bold;
    }

    .canal {
      color: #00ffcc; /* verde */
      font-weight: bold;
    }

  </style>
</head>

<body>

  <!-- BANNER -->
  <div class="topo">
    <a href="./">
      <img src="banner_topo_001.png" alt="TelegramGrupos" class="banner">
    </a>
  </div>

  <!-- TÍTULO -->
  <div class="titulo">
    Os Melhores Grupos do Telegram!
  </div>

  <!-- SUBTÍTULO -->
  <div class="subtitulo">
    Grupos e canais organizados por categoria!<br>
    Zero propaganda e livre de vírus
  </div>

  <!-- BOTÕES -->
  <div class="botoes">
    <img src="botao_ver_grupos_001.png" alt="Ver Grupos" class="botao-img">
    <img src="botao_ver_canais_001.png" alt="Ver Canais" class="botao-img">
  </div>

  <!-- EXPLICAÇÃO -->
  <div class="explicacao-container">

    <div class="explicacao-titulo">
      A diferença de canal para grupos
    </div>

    <div class="explicacao-texto">
      <span class="grupo">Grupos:</span> todos podem conversar e interagir.<br><br>
      <span class="canal">Canais:</span> apenas administradores publicam conteúdo.
    </div>

  </div>

</body>
</html>
